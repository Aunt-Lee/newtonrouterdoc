site_name: 牛顿AI中转站
site_description: 牛顿AI中转站使用文档
site_url: https://example.vercel.app

repo_name: GitHub

theme:
  name: material
  language: zh
  logo: assets/images/newton.png
  favicon: assets/images/newton.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: black
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - announce.dismiss
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - navigation.footer
    - navigation.instant
    - navigation.path
    - navigation.expand
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang:
        - zh
        - en
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/
      name: GitHub

nav:
  - 快速开始: Start.md
  - CLI 工具配置:
      - Codex 工具配置: CliConfig/CodexConfig.md
      - Claude Code 工具配置: CliConfig/ClaudeCodeConfig.md
  - 常见问题:
      - Claude Code 常见问题: QA/ClaudeCodeQA.md
